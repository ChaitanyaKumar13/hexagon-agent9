# Pins the app to the Hexagon navy dark theme for EVERY viewer.
# Without this file, Streamlit follows each viewer's OS light/dark setting -
# which is why Windows machines (light mode) showed white-on-white inputs
# while Mac (dark mode) looked fine.
#
# Place this file at:  .streamlit/config.toml  (repo root)

[theme]
base = "dark"
primaryColor = "#C9DD28"
backgroundColor = "#0C2C40"
secondaryBackgroundColor = "#123B54"
textColor = "#D7E3EC"
font = "sans serif"
